version: "2"
sql:
  - engine: "postgresql"
    schema:
      - "internal/sqlc/schema/*.sql"
    queries:
      - "internal/sqlc/queries/*.sql"
    gen:
      go:
        package: "dbgen"
        out: "internal/sqlc/dbgen"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: false
        emit_exact_table_names: false
