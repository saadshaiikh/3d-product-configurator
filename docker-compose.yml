services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  migrate:
    image: migrate/migrate:v4.17.1
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://app:app@db:5432/appdb?sslmode=disable
    volumes:
      - ./backend/migrations:/migrations:ro
    command:
      - "-path"
      - "/migrations"
      - "-database"
      - "postgres://app:app@db:5432/appdb?sslmode=disable"
      - "up"
    restart: on-failure
  api:
    build: .
    environment:
      DATABASE_URL: postgres://app:app@db:5432/appdb?sslmode=disable
      ADDR: ":8080"
      FRONTEND_DIR: /app/build
      STATIC_DIR: /app/public/static
      ASSET_BASE_URL: http://localhost:8080/static/models
    ports:
      - "8080:8080"
    depends_on:
      - migrate

volumes:
  pgdata:
